name: update_upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update_upstream:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_TOKEN2 }}
          persist-credentials: true

      - name: Setup Python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.8.x"

      - name: Update source
        run: |
          python3 build.py --update_code

      - name: Commit and push changes
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No upstream changes."
            exit 0
          fi

          UPDATE_UTC_TIME=$(date -u '+%Y-%m-%d-%H:%M')

          git config --global user.name "Cyber Knight"
          git config --global user.email "cyberknight755@gmail.com"
          git add build.py magisk_config.prop native tools
          git commit -m "Update code date: Etc/UTC: $UPDATE_UTC_TIME"

          git push origin HEAD:main
